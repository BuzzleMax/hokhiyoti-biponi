<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hokhiyoti Biponi — Storefront</title>
    <meta name="description" content="Shop collections, categories, and products from Hokhiyoti Biponi." />

    <meta name="theme-color" content="#6A1E1E" />

    <!-- Luxury typography: Playfair Display (headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- No-flicker theme initialization: set `html.dark` before paint -->
    <script>
      (function () {
        try {
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (prefersDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <!-- Scroll to top on fresh load — prevents browser restoring previous scroll -->
    <script>
      if (history.scrollRestoration) { history.scrollRestoration = 'manual'; }
    </script>

    <!-- Hash-based routing redirect for GitHub Pages -->
    <script>
      (function() {
        // If no hash is present, redirect to #/ for the homepage
        if (!window.location.hash) {
          window.location.hash = '#/';
        }
      })();
    </script>

    <meta property="og:title" content="Hokhiyoti Biponi — Storefront" />
    <meta property="og:description" content="Shop collections, categories, and products from Hokhiyoti Biponi." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buzzlemax.github.io/hokhiyoti-biponi/" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicons with cache busting -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest?v=2">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
